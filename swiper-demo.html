<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiper dynamicMainBullets Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    body {
      font-family: -apple-system, "PingFang TC", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }
    .controls {
      display: flex;
      gap: 32px;
      align-items: center;
      margin-bottom: 20px;
      padding: 16px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      flex-wrap: wrap;
    }
    .control {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .control label {
      font-weight: 600;
      font-size: 14px;
    }
    .control input[type="range"] {
      width: 160px;
    }
    .control .value {
      display: inline-block;
      min-width: 28px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      color: #1976d2;
      background: #e3f2fd;
      border-radius: 4px;
      padding: 2px 6px;
    }
    .swiper {
      width: 100%;
      max-width: 640px;
      height: 320px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .swiper-slide {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: #fff;
    }
    .hint {
      max-width: 640px;
      margin-top: 12px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="controls">
    <div class="control">
      <label for="bullets">dynamicMainBullets</label>
      <input id="bullets" type="range" min="1" max="10" value="5" />
      <span class="value" id="bulletsValue">5</span>
    </div>
    <div class="control">
      <label for="slides">Slide 個數</label>
      <input id="slides" type="range" min="1" max="30" value="9" />
      <span class="value" id="slidesValue">9</span>
    </div>
    <div class="control">
      <label for="loop">loop</label>
      <input id="loop" type="checkbox" />
    </div>
  </div>

  <div class="swiper">
    <div class="swiper-wrapper" id="wrapper"></div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  </div>
  <p class="hint">拉動滑桿即時重建 Swiper。dynamicBullets 開啟,主要 bullet 數 = dynamicMainBullets。</p>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const colors = ['#e57373','#64b5f6','#81c784','#ffb74d','#ba68c8',
                    '#4db6ac','#f06292','#7986cb','#a1887f','#90a4ae'];
    const bulletsInput = document.getElementById('bullets');
    const slidesInput = document.getElementById('slides');
    const bulletsValue = document.getElementById('bulletsValue');
    const slidesValue = document.getElementById('slidesValue');
    const loopInput = document.getElementById('loop');
    const wrapper = document.getElementById('wrapper');
    let swiper = null;

    function buildSlides(count) {
      wrapper.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const el = document.createElement('div');
        el.className = 'swiper-slide';
        el.textContent = 'Slide ' + i;
        el.style.background = colors[(i - 1) % colors.length];
        wrapper.appendChild(el);
      }
    }

    function rebuild() {
      const bullets = +bulletsInput.value;
      const slides = +slidesInput.value;
      bulletsValue.textContent = bullets;
      slidesValue.textContent = slides;

      const activeIndex = swiper ? Math.min(swiper.realIndex, slides - 1) : 0;
      if (swiper) swiper.destroy(true, true);

      buildSlides(slides);

      swiper = new Swiper('.swiper', {
        initialSlide: activeIndex,
        loop: loopInput.checked,
        pagination: {
          el: '.swiper-pagination',
          clickable: true,
          dynamicBullets: true,
          dynamicMainBullets: bullets,
        },
        navigation: {
          nextEl: '.swiper-button-next',
          prevEl: '.swiper-button-prev',
        },
      });
    }

    bulletsInput.addEventListener('input', rebuild);
    slidesInput.addEventListener('input', rebuild);
    loopInput.addEventListener('change', rebuild);
    rebuild();
  </script>
</body>
</html>
